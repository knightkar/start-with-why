<svg width="420" height="260" viewBox="0 0 420 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .outline { fill: none; stroke: #FFD166; stroke-width: 3; }
    .limbic { fill: rgba(255, 209, 102, 0.18); stroke: #FFD166; stroke-width: 2; }
    .label { fill: #F5F5F7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; text-anchor: middle; }
  </style>

  <!-- Brain Outline -->
  <path class="outline"
        d="M60 130
           C 60 60, 120 30, 200 30
           C 280 30, 340 60, 340 130
           C 340 200, 280 230, 200 230
           C 120 230, 60 200, 60 130z" />

  <!-- Limbic System -->
  <ellipse class="limbic" cx="200" cy="130" rx="55" ry="40"/>

  <!-- Labels -->
  <text class="label" x="200" y="135">WHY / HOW</text>
  <text class="label" x="200" y="70">Neocortex (WHAT)</text>
</svg>
